name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-jar:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.project.outputs.app_version }}
      jar_name: ${{ steps.project.outputs.jar_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build application jar
        run: mvn -B -ntp clean package -DskipTests

      - name: Capture build metadata
        id: project
        shell: bash
        run: |
          set -euo pipefail
          app_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          jar_name="$(basename "$(find target -maxdepth 1 -type f -name 'rocketmq-dashboard-*.jar' ! -name '*original*' | head -n 1)")"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "jar_name=${jar_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/${{ steps.project.outputs.jar_name }}
          if-no-files-found: error

  package-linux:
    needs: build-jar
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Package linux release
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/package-linux-release.sh
          scripts/package-linux-release.sh \
            "${{ matrix.arch }}" \
            "${{ needs.build-jar.outputs.app_version }}" \
            "target/${{ needs.build-jar.outputs.jar_name }}" \
            dist

      - name: Upload packaged release
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-jar
      - package-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-linux-*
          merge-multiple: true
          path: dist

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ needs.build-jar.outputs.jar_name }}
            dist/*.tar.gz
            dist/*.sha256

  publish-container:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Prepare Docker build context
        run: cp "target/${{ needs.build-jar.outputs.jar_name }}" .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rocketmq-dashboard
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
